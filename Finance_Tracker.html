<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FinanceFlow | Aditi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:#0b0b0d; --surface:#141417; --surface2:#1c1c21;
            --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
            --text:#f0ede8; --muted:#a0a0a5; --hint:#555;
            --green:#2dd98f; --green-dim:rgba(45,217,143,0.1);
            --red:#ff5f57; --red-dim:rgba(255,95,87,0.1);
            --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.1);
            --amber:#f5a623; --purple:#a78bfa;
            --accent:#2dd98f; --radius:12px; --radius-sm:6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

        /* Layout */
        .shell { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; }

        /* Navigation */
        .logo { padding: 30px 24px; }
        .logo-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--green); }
        .nav-item { padding: 12px 24px; color: var(--muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; border-right: 3px solid transparent; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { color: var(--green); background: var(--green-dim); border-right-color: var(--green); }

        /* Components */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .metric { padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); }
        .metric-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
        .metric-value { font-size: 24px; font-weight: 600; }

        /* Forms */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; align-items: end; }
        input, select { background: var(--bg); border: 1px solid var(--border2); padding: 10px; border-radius: var(--radius-sm); color: white; width: 100%; outline: none; }
        input:focus { border-color: var(--green); }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
        .btn-danger { color: var(--red); background: var(--red-dim); }

        /* Tables & Lists */
        .tx-group-header { font-size: 12px; color: var(--muted); margin: 20px 0 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .tx-row { display: flex; align-items: center; padding: 12px; border-radius: var(--radius-sm); transition: 0.2s; gap: 15px; }
        .tx-row:hover { background: var(--surface2); }
        .tx-info { flex: 1; }
        .tx-amt { font-weight: 600; width: 100px; text-align: right; }
        
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
    </style>
</head>
<body>

<div class="shell">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-title">FinanceFlow</div>
            <div style="font-size: 11px; color: var(--muted)">PERSONAL TRACKER</div>
        </div>
        <nav>
            <div class="nav-item active" onclick="showPage('overview', this)">◈ Overview</div>
            <div class="nav-item" onclick="showPage('transactions', this)">🧾 Transactions</div>
            <div class="nav-item" onclick="showPage('budget', this)">🧮 Budgets</div>
            <div class="nav-item" onclick="showPage('goals', this)">🎯 Goals</div>
        </nav>
        <div style="margin-top: auto; padding: 20px;">
            <button class="btn btn-ghost" style="width: 100%; margin-bottom: 8px;" onclick="exportData()">Export JSON</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            <button class="btn btn-ghost" style="width: 100%" onclick="document.getElementById('importFile').click()">Import JSON</button>
        </div>
    </aside>

    <main class="main">
        <div id="page-overview" class="page active">
            <h1 style="margin-bottom: 24px;">Welcome back, Aditi</h1>
            <div class="grid-3" id="overview-metrics"></div>
            <div class="grid-3">
                <div class="card" style="grid-column: span 2;">
                    <div class="metric-label">Savings Trend</div>
                    <div style="height: 250px;"><canvas id="chartTrend"></canvas></div>
                </div>
                <div class="card">
                    <div class="metric-label">Monthly Comparison</div>
                    <div style="height: 250px;"><canvas id="chartMix"></canvas></div>
                </div>
            </div>
        </div>

        <div id="page-transactions" class="page">
            <div class="card">
                <h3 id="tx-form-title" style="margin-bottom: 15px;">Add Transaction</h3>
                <div class="form-grid">
                    <div><label class="metric-label">Date</label><input type="date" id="f-date"></div>
                    <div><label class="metric-label">Description</label><input type="text" id="f-desc" placeholder="Pizza, Rent..."></div>
                    <div><label class="metric-label">Amount</label><input type="number" id="f-amt" placeholder="₹ 0.00"></div>
                    <div>
                        <label class="metric-label">Category</label>
                        <select id="f-cat">
                            <option>Salary</option><option>Food</option><option>Travel</option>
                            <option>Rent</option><option>Shopping</option><option>Other</option>
                        </select>
                    </div>
                    <div><label class="metric-label">Wallet</label><select id="f-wallet"><option>Bank</option><option>Cash</option></select></div>
                    <div><label class="metric-label">Type</label><select id="f-type"><option value="expense">Expense</option><option value="income">Income</option></select></div>
                    <button class="btn btn-primary" onclick="handleTransaction()">Save</button>
                </div>
            </div>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Transaction History</h3>
                    <input type="text" id="tx-search" placeholder="Search..." style="width: 200px;" oninput="renderTransactions()">
                </div>
                <div id="tx-list"></div>
            </div>
        </div>

        <div id="page-budget" class="page">
            <div class="card">
                <h3>Monthly Limits</h3>
                <p style="color: var(--muted); margin-bottom: 20px;">Tracking expenses against your set limits.</p>
                <div id="budget-list"></div>
            </div>
        </div>

        <div id="page-goals" class="page">
            <div class="card">
                <h3 id="g-form-title" style="margin-bottom: 15px;">New Saving Goal</h3>
                <div class="form-grid">
                    <div style="grid-column: span 2;">
                        <label class="metric-label">Goal Name</label>
                        <input type="text" id="g-name" placeholder="e.g. New Laptop">
                    </div>
                    <div><label class="metric-label">Target (₹)</label><input type="number" id="g-target" placeholder="0"></div>
                    <div><label class="metric-label">Saved So Far (₹)</label><input type="number" id="g-saved" placeholder="0"></div>
                    <div style="display: flex; gap: 8px;">
                        <button id="g-save-btn" class="btn btn-primary" style="flex: 1;" onclick="handleGoal()">Create Goal</button>
                        <button id="g-cancel-btn" class="btn btn-ghost hidden" onclick="cancelGoalEdit()">Cancel</button>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Your Goals</h3>
                <input type="text" id="goal-search" placeholder="Filter goals..." style="width: 240px;" oninput="renderGoals()">
            </div>
            <div id="goal-container" class="grid-3"></div>
        </div>
    </main>
</div>

<script>
    let state = {
        transactions: JSON.parse(localStorage.getItem('aditi_tx') || '[]'),
        goals: JSON.parse(localStorage.getItem('aditi_goals') || '[]'),
        budgets: { "Food": 5000, "Shopping": 3000, "Travel": 2000 }
    };

    let editingId = null;
    let editingGoalId = null;
    let charts = {};

    function sync() {
        localStorage.setItem('aditi_tx', JSON.stringify(state.transactions));
        localStorage.setItem('aditi_goals', JSON.stringify(state.goals));
        updateUI();
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        el.classList.add('active');
        updateUI();
    }

    // Transactions Logic
    function handleTransaction() {
        const data = {
            id: editingId || Date.now(),
            date: document.getElementById('f-date').value,
            desc: document.getElementById('f-desc').value,
            amt: parseFloat(document.getElementById('f-amt').value),
            cat: document.getElementById('f-cat').value,
            wallet: document.getElementById('f-wallet').value,
            type: document.getElementById('f-type').value
        };
        if (!data.date || !data.desc || isNaN(data.amt)) return alert("Check inputs!");

        if (editingId) {
            state.transactions = state.transactions.map(t => t.id === editingId ? data : t);
            editingId = null;
            document.getElementById('tx-form-title').innerText = "Add Transaction";
        } else {
            state.transactions.unshift(data);
        }
        resetTxForm();
        sync();
    }

    function resetTxForm() {
        document.getElementById('f-desc').value = '';
        document.getElementById('f-amt').value = '';
        document.getElementById('f-date').valueAsDate = new Date();
    }

    function editTx(id) {
        const t = state.transactions.find(x => x.id === id);
        document.getElementById('f-date').value = t.date;
        document.getElementById('f-desc').value = t.desc;
        document.getElementById('f-amt').value = t.amt;
        document.getElementById('f-cat').value = t.cat;
        document.getElementById('f-wallet').value = t.wallet;
        document.getElementById('f-type').value = t.type;
        editingId = id;
        document.getElementById('tx-form-title').innerText = "Edit Transaction ✏️";
        window.scrollTo(0, 0);
    }

    function deleteTx(id) {
        if(confirm("Delete transaction?")) {
            state.transactions = state.transactions.filter(t => t.id !== id);
            sync();
        }
    }

    // Goals Logic
    function handleGoal() {
        const name = document.getElementById('g-name').value;
        const target = parseFloat(document.getElementById('g-target').value);
        const saved = parseFloat(document.getElementById('g-saved').value) || 0;

        if (!name || isNaN(target)) return alert("Check inputs!");

        const goalData = { id: editingGoalId || Date.now(), name, target, current: saved };

        if (editingGoalId) {
            state.goals = state.goals.map(g => g.id === editingGoalId ? goalData : g);
            cancelGoalEdit();
        } else {
            state.goals.unshift(goalData);
        }
        
        document.getElementById('g-name').value = '';
        document.getElementById('g-target').value = '';
        document.getElementById('g-saved').value = '';
        sync();
    }

    function editGoal(id) {
        const g = state.goals.find(x => x.id === id);
        editingGoalId = id;
        document.getElementById('g-name').value = g.name;
        document.getElementById('g-target').value = g.target;
        document.getElementById('g-saved').value = g.current;
        document.getElementById('g-form-title').innerText = "Edit Goal Card ✏️";
        document.getElementById('g-save-btn').innerText = "Update Goal";
        document.getElementById('g-cancel-btn').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function cancelGoalEdit() {
        editingGoalId = null;
        document.getElementById('g-form-title').innerText = "New Saving Goal";
        document.getElementById('g-save-btn').innerText = "Create Goal";
        document.getElementById('g-cancel-btn').classList.add('hidden');
        document.getElementById('g-name').value = '';
        document.getElementById('g-target').value = '';
        document.getElementById('g-saved').value = '';
    }

    function deleteGoal(id) {
        if(confirm("Delete goal?")) {
            state.goals = state.goals.filter(g => g.id !== id);
            sync();
        }
    }

    function updateGoal(id) {
        const amt = parseFloat(prompt("Add contribution (₹):"));
        if (isNaN(amt) || amt <= 0) return;
        state.goals = state.goals.map(g => g.id === id ? {...g, current: g.current + amt} : g);
        sync();
    }

    // UI Updates
    function updateUI() {
        renderOverview();
        renderTransactions();
        renderGoals();
        renderBudgets();
    }

    function renderOverview() {
        const inc = state.transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amt, 0);
        const exp = state.transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amt, 0);
        document.getElementById('overview-metrics').innerHTML = `
            <div class="metric"><div class="metric-label">Total Balance</div><div class="metric-value">₹${(inc - exp).toLocaleString()}</div></div>
            <div class="metric"><div class="metric-label">Total Income</div><div class="metric-value text-green">₹${inc.toLocaleString()}</div></div>
            <div class="metric"><div class="metric-label">Total Expenses</div><div class="metric-value text-red">₹${exp.toLocaleString()}</div></div>
        `;
        initCharts();
    }

    function renderTransactions() {
        const list = document.getElementById('tx-list');
        const query = document.getElementById('tx-search').value.toLowerCase();
        let filtered = state.transactions.filter(t => t.desc.toLowerCase().includes(query) || t.cat.toLowerCase().includes(query));
        list.innerHTML = filtered.length ? "" : "<p style='color:var(--hint)'>No records found</p>";
        let lastDate = "";
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            if (t.date !== lastDate) { list.innerHTML += `<div class="tx-group-header">${t.date}</div>`; lastDate = t.date; }
            list.innerHTML += `
                <div class="tx-row">
                    <div style="width: 40px; font-size: 20px;">${t.type === 'income' ? '💰' : '💸'}</div>
                    <div class="tx-info"><div style="font-weight: 500">${t.desc}</div><div style="font-size: 11px; color: var(--muted)">${t.cat} • ${t.wallet}</div></div>
                    <div class="tx-amt ${t.type === 'income' ? 'text-green' : 'text-red'}">${t.type === 'income' ? '+' : '-'} ₹${t.amt.toLocaleString()}</div>
                    <button class="btn btn-ghost" onclick="editTx(${t.id})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteTx(${t.id})">✕</button>
                </div>`;
        });
    }

    function renderGoals() {
        const cont = document.getElementById('goal-container');
        const query = document.getElementById('goal-search').value.toLowerCase();
        const filtered = state.goals.filter(g => g.name.toLowerCase().includes(query));
        cont.innerHTML = filtered.length ? "" : "<p style='color:var(--hint); grid-column: span 3;'>No goals found</p>";
        cont.innerHTML += filtered.map(g => {
            const pct = Math.min(100, (g.current / g.target) * 100);
            return `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div class="metric-label">${g.name}</div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-ghost" style="font-size:11px" onclick="editGoal(${g.id})">Edit</button>
                            <button class="btn-ghost text-red" style="font-size:11px" onclick="deleteGoal(${g.id})">✕</button>
                        </div>
                    </div>
                    <div class="metric-value" style="font-size: 18px">₹${g.current.toLocaleString()} / ₹${g.target.toLocaleString()}</div>
                    <div style="height: 6px; background: var(--bg); border-radius: 3px; margin: 15px 0;">
                        <div style="width: ${pct}%; height: 100%; background: ${pct>=100?'var(--green)':'var(--blue)'}; border-radius: 3px;"></div>
                    </div>
                    <button class="btn btn-ghost" style="width: 100%" onclick="updateGoal(${g.id})">${pct>=100?'Completed!':'Add Funds'}</button>
                </div>`;
        }).join('');
    }

    function renderBudgets() {
        const cont = document.getElementById('budget-list');
        cont.innerHTML = Object.entries(state.budgets).map(([cat, limit]) => {
            const spent = state.transactions.filter(t => t.cat === cat && t.type === 'expense').reduce((a, b) => a + b.amt, 0);
            const pct = Math.min(100, (spent/limit)*100);
            return `
                <div style="margin-bottom: 20px">
                    <div style="display:flex; justify-content: space-between; margin-bottom: 8px;"><span>${cat}</span><span style="color: var(--muted)">₹${spent} / ₹${limit}</span></div>
                    <div style="height: 4px; background: var(--bg); border-radius: 2px;"><div style="width: ${pct}%; height:100%; background: ${pct > 90 ? 'var(--red)' : 'var(--green)'};"></div></div>
                </div>`;
        }).join('');
    }

    function initCharts() {
        const summary = {};
        [...state.transactions].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t => {
            const k = t.date.slice(0, 7);
            if (!summary[k]) summary[k] = { label: new Date(t.date).toLocaleString('default', {month:'short', year:'2-digit'}), inc: 0, exp: 0 };
            t.type === 'income' ? summary[k].inc += t.amt : summary[k].exp += t.amt;
        });
        const labels = Object.values(summary).map(d => d.label);
        const incData = Object.values(summary).map(d => d.inc);
        const expData = Object.values(summary).map(d => d.exp);
        const savData = Object.values(summary).map(d => d.inc - d.exp);

        if (charts.mix) charts.mix.destroy();
        charts.mix = new Chart(document.getElementById('chartMix').getContext('2d'), {
            type: 'bar', data: { labels, datasets: [{label:'Inc', data:incData, backgroundColor:'#2dd98f'}, {label:'Exp', data:expData, backgroundColor:'#ff5f57'}] },
            options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
        });

        if (charts.trend) charts.trend.destroy();
        charts.trend = new Chart(document.getElementById('chartTrend').getContext('2d'), {
            type: 'line', data: { labels, datasets: [{label:'Savings', data:savData, borderColor:'#4f8ef7', fill:true, backgroundColor:'rgba(79,142,247,0.1)', tension:0.4}] },
            options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
        });
    }

    function exportData() { window.open("data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state))); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { state = JSON.parse(ev.target.result); sync(); }; r.readAsText(e.target.files[0]); }

    document.getElementById('f-date').valueAsDate = new Date();
    updateUI();
</script>
</body>
</html>
