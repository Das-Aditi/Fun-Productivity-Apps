<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Flow | Aditi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:#0b0b0d; --surface:#141417; --surface2:#1c1c21;
            --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
            --text:#f0ede8; --muted:#a0a0a5; --hint:#555;
            --green:#2dd98f; --green-dim:rgba(45,217,143,0.1);
            --red:#ff5f57; --red-dim:rgba(255,95,87,0.1);
            --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.1);
            --amber:#f5a623; /* FIX: was missing, caused amber border on cash accounts to fail */
            --radius:12px; --radius-sm:6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

        .shell { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }
        .main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; }

        .logo { padding: 30px 24px; }
        .logo-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--green); }
        .nav-item { padding: 12px 24px; color: var(--muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; border-right: 3px solid transparent; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { color: var(--green); background: var(--green-dim); border-right-color: var(--green); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .metric { padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); }
        .metric-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
        .metric-value { font-size: 24px; font-weight: 600; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; align-items: end; }
        input, select, textarea { background: var(--bg); border: 1px solid var(--border2); padding: 10px; border-radius: var(--radius-sm); color: var(--text); width: 100%; outline: none; font-family: inherit; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: var(--green); }
        select option { background: var(--surface2); }

        .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-family: inherit; font-size: 14px; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
        .btn-danger { color: var(--red); background: var(--red-dim); border: 1px solid transparent; }
        .btn-danger:hover { border-color: var(--red); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .tx-group-header { font-size: 12px; color: var(--muted); margin: 20px 0 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .tx-row { display: flex; align-items: center; padding: 12px; border-radius: var(--radius-sm); transition: 0.2s; gap: 15px; }
        .tx-row:hover { background: var(--surface2); }
        .tx-info { flex: 1; }
        .tx-amt { font-weight: 600; width: 120px; text-align: right; }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }

        @media (max-width: 900px) {
            .shell { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; padding: 12px 16px; gap: 4px; align-items: center; }
            .logo { padding: 0; margin-right: 12px; }
            .nav-item { padding: 8px 12px; border-right: none; border-radius: var(--radius-sm); font-size: 13px; }
            .nav-item.active { border-right: none; }
            .main { padding: 20px 16px; }
            .grid-3 { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="shell">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-title">Finance Flow</div>
            <div style="font-size: 11px; color: var(--muted)">BANKING & INVESTMENTS</div>
        </div>
        <nav>
            <div class="nav-item active" onclick="showPage('overview', this)">📊 Overview</div>
            <div class="nav-item" onclick="showPage('transactions', this)">🧾 Transactions</div>
            <div class="nav-item" onclick="showPage('accounts', this)">🏦 Accounts</div>
            <div class="nav-item" onclick="showPage('goals', this)">🎯 Goals</div>
        </nav>
        <div style="margin-top: auto; padding: 20px;">
            <button class="btn btn-ghost" style="width: 100%; margin-bottom: 8px;" onclick="exportData()">↓ Export JSON</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            <button class="btn btn-ghost" style="width: 100%" onclick="document.getElementById('importFile').click()">↑ Import JSON</button>
        </div>
    </aside>

    <main class="main">

        <!-- OVERVIEW -->
        <div id="page-overview" class="page active">
            <h1 style="margin-bottom: 24px; font-family: 'DM Serif Display', serif;">Finance Tracker</h1>
            <div class="grid-3" id="overview-metrics"></div>
            <div class="grid-3">
                <div class="card" style="grid-column: span 2;">
                    <div class="metric-label" style="margin-bottom: 12px;">Net Savings Trend</div>
                    <div style="height: 250px;"><canvas id="chartTrend"></canvas></div>
                </div>
                <div class="card">
                    <div class="metric-label" style="margin-bottom: 12px;">Inflow vs Outflow</div>
                    <div style="height: 250px;"><canvas id="chartMix"></canvas></div>
                </div>
            </div>
        </div>

        <!-- TRANSACTIONS -->
        <div id="page-transactions" class="page">
            <div class="card">
                <h3 id="tx-form-title" style="margin-bottom: 15px;">Add Transaction</h3>
                <div class="form-grid">
                    <div><label class="metric-label">Date</label><input type="date" id="f-date"></div>
                    <div><label class="metric-label">Description</label><input type="text" id="f-desc" placeholder="Salary, Rent..."></div>
                    <div><label class="metric-label">Amount (₹)</label><input type="number" id="f-amt" min="0" placeholder="0.00"></div>
                    <div>
                        <label class="metric-label">Category</label>
                        <select id="f-cat">
                            <option>Salary</option><option>Food</option><option>Travel</option>
                            <option>Rent</option><option>Shopping</option><option>Bills</option><option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="metric-label">Account / Wallet</label>
                        <select id="f-wallet"></select>
                    </div>
                    <div>
                        <label class="metric-label">Type</label>
                        <select id="f-type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:8px; align-items:flex-end;">
                        <button class="btn btn-primary" style="flex:1" onclick="handleTransaction()">Save Entry</button>
                        <!-- FIX: added cancel button for edit mode -->
                        <button id="tx-cancel-btn" class="btn btn-ghost hidden" onclick="cancelTxEdit()">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Transaction History</h3>
                    <input type="text" id="tx-search" placeholder="Search..." style="width: 200px;" oninput="renderTransactions()">
                </div>
                <div id="tx-list"></div>
            </div>
        </div>

        <!-- ACCOUNTS -->
        <div id="page-accounts" class="page">
            <div class="card">
                <h3 id="acc-form-title">🏦 Register New Account</h3>
                <div class="form-grid" style="margin-top:15px;">
                    <div style="grid-column: span 2;">
                        <label class="metric-label">Account Name</label>
                        <input type="text" id="acc-name" placeholder="HDFC, SBI, Cash...">
                    </div>
                    <div>
                        <label class="metric-label">Type</label>
                        <select id="acc-type">
                            <option value="Bank">Bank Account</option>
                            <option value="Cash">Cash Wallet</option>
                        </select>
                    </div>
                    <div>
                        <label class="metric-label">Current Balance (₹)</label>
                        <input type="number" id="acc-initial-amt" placeholder="0">
                    </div>
                    <div style="display: flex; gap: 8px; align-items: flex-end;">
                        <button id="acc-btn-main" class="btn btn-primary" style="flex: 1;" onclick="handleAccountAction()">Add Account</button>
                        <button id="acc-btn-cancel" class="btn btn-ghost hidden" onclick="cancelAccountEdit()">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="grid-3" id="bank-cards-container"></div>

            <div class="card" style="margin-top: 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 id="fd-section-title">Fixed Deposit (FD) Manager</h3>
                    <button class="btn btn-ghost btn-sm" onclick="showFDForm()">+ New FD</button>
                </div>
                <div id="fd-form" class="form-grid hidden" style="margin-bottom:20px; padding:20px; background:var(--surface2); border-radius:var(--radius-sm); grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
                    <div><label class="metric-label">Bank</label><input type="text" id="fd-bank"></div>
                    <div><label class="metric-label">Beneficiary</label><input type="text" id="fd-beneficiary" placeholder="Self"></div>
                    <div><label class="metric-label">Amount (₹)</label><input type="number" id="fd-amount"></div>
                    <div><label class="metric-label">Rate %</label><input type="number" step="0.1" id="fd-rate"></div>
                    <div><label class="metric-label">Created</label><input type="date" id="fd-created"></div>
                    <div><label class="metric-label">Maturity</label><input type="date" id="fd-maturity"></div>
                    <div style="grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                        <button class="btn btn-ghost" onclick="cancelFDEdit()">Cancel</button>
                        <button id="fd-btn-save" class="btn btn-primary" onclick="handleFDAction()">Save FD</button>
                    </div>
                </div>
                <div id="fd-list"></div>
            </div>
        </div>

        <!-- GOALS -->
        <div id="page-goals" class="page">
            <div class="card">
                <h3 id="g-form-title" style="margin-bottom: 15px;">New Saving Goal</h3>
                <div class="form-grid">
                    <div style="grid-column: span 2;">
                        <label class="metric-label">Goal Name</label>
                        <input type="text" id="g-name" placeholder="e.g. Higher Studies">
                    </div>
                    <div><label class="metric-label">Target (₹)</label><input type="number" id="g-target" placeholder="0"></div>
                    <div><label class="metric-label">Saved So Far (₹)</label><input type="number" id="g-saved" placeholder="0"></div>
                    <div style="display: flex; gap: 8px;">
                        <button id="g-save-btn" class="btn btn-primary" style="flex: 1;" onclick="handleGoal()">Create Goal</button>
                        <button id="g-cancel-btn" class="btn btn-ghost hidden" onclick="cancelGoalEdit()">Cancel</button>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Investment Goals</h3>
                <input type="text" id="goal-search" placeholder="Filter goals..." style="width: 240px;" oninput="renderGoals()">
            </div>
            <div id="goal-container" class="grid-3"></div>
        </div>

    </main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
    transactions: JSON.parse(localStorage.getItem('aditi_tx') || '[]'),
    goals:        JSON.parse(localStorage.getItem('aditi_goals') || '[]'),
    accounts:     JSON.parse(localStorage.getItem('aditi_accounts') || '[{"id":1,"name":"HDFC","type":"Bank"},{"id":2,"name":"Cash","type":"Cash"}]'),
    fds:          JSON.parse(localStorage.getItem('aditi_fds') || '[]'),
    notes:        JSON.parse(localStorage.getItem('aditi_notes') || '{}')
};

let editingId        = null;
let editingGoalId    = null;
let editingAccountId = null;
let editingFDId      = null;
let charts           = {};

function sync() {
    localStorage.setItem('aditi_tx',       JSON.stringify(state.transactions));
    localStorage.setItem('aditi_goals',    JSON.stringify(state.goals));
    localStorage.setItem('aditi_accounts', JSON.stringify(state.accounts));
    localStorage.setItem('aditi_fds',      JSON.stringify(state.fds));
    localStorage.setItem('aditi_notes',    JSON.stringify(state.notes));
    updateUI();
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const target = document.getElementById('page-' + id);
    if (target) target.classList.add('active');
    if (el) el.classList.add('active');
    updateUI();
}

// ── TRANSACTIONS ───────────────────────────────────────────────────────────
function handleTransaction() {
    const data = {
        id:     editingId || Date.now(),
        date:   document.getElementById('f-date').value,
        desc:   document.getElementById('f-desc').value.trim(),
        amt:    parseFloat(document.getElementById('f-amt').value),
        cat:    document.getElementById('f-cat').value,
        wallet: document.getElementById('f-wallet').value,
        type:   document.getElementById('f-type').value
    };
    if (!data.date || !data.desc || isNaN(data.amt) || data.amt <= 0) {
        return alert('Please fill all fields correctly.');
    }
    if (editingId) {
        state.transactions = state.transactions.map(t => t.id === editingId ? data : t);
    } else {
        state.transactions.unshift(data);
    }
    cancelTxEdit();
    sync();
}

function cancelTxEdit() {
    editingId = null;
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amt').value  = '';
    document.getElementById('f-date').valueAsDate = new Date();
    document.getElementById('tx-form-title').innerText = 'Add Transaction';
    document.getElementById('tx-cancel-btn').classList.add('hidden');
}

function editTx(id) {
    const t = state.transactions.find(x => x.id === id);
    if (!t) return;
    document.getElementById('f-date').value  = t.date;
    document.getElementById('f-desc').value  = t.desc;
    document.getElementById('f-amt').value   = t.amt;
    document.getElementById('f-cat').value   = t.cat;
    document.getElementById('f-wallet').value = t.wallet;
    document.getElementById('f-type').value  = t.type;
    editingId = id;
    document.getElementById('tx-form-title').innerText = 'Edit Transaction ✏️';
    document.getElementById('tx-cancel-btn').classList.remove('hidden');
    showPage('transactions', document.querySelector('[onclick*="transactions"]'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteTx(id) {
    if (confirm('Delete this transaction?')) {
        state.transactions = state.transactions.filter(t => t.id !== id);
        sync();
    }
}

// ── ACCOUNTS ───────────────────────────────────────────────────────────────
function handleAccountAction() {
    const name            = document.getElementById('acc-name').value.trim();
    const type            = document.getElementById('acc-type').value;
    const newBalanceInput = parseFloat(document.getElementById('acc-initial-amt').value) || 0;

    if (!name) return alert('Enter an account name.');

    if (editingAccountId) {
        const oldAcc = state.accounts.find(a => a.id === editingAccountId);
        const currentCalcBal = state.transactions
            .filter(t => t.wallet === oldAcc.name)
            .reduce((s, t) => s + (t.type === 'income' ? t.amt : -t.amt), 0);

        if (newBalanceInput !== currentCalcBal) {
            const diff = newBalanceInput - currentCalcBal;
            state.transactions.unshift({
                id:     Date.now(),
                date:   new Date().toISOString().split('T')[0],
                desc:   'Balance Adjustment: ' + name,
                amt:    Math.abs(diff),
                cat:    'Other',
                wallet: name,
                type:   diff > 0 ? 'income' : 'expense'
            });
        }
        // Rename: update linked transactions
        if (oldAcc.name !== name) {
            state.transactions = state.transactions.map(t =>
                t.wallet === oldAcc.name ? { ...t, wallet: name } : t
            );
        }
        state.accounts = state.accounts.map(a =>
            a.id === editingAccountId ? { ...a, name, type } : a
        );
    } else {
        state.accounts.push({ id: Date.now(), name, type });
        if (newBalanceInput !== 0) {
            state.transactions.unshift({
                id:     Date.now() + 1,
                date:   new Date().toISOString().split('T')[0],
                desc:   'Opening Balance: ' + name,
                amt:    newBalanceInput,
                cat:    'Other',
                wallet: name,
                type:   'income'
            });
        }
    }
    cancelAccountEdit();
    sync();
}

function editAccount(id) {
    const acc = state.accounts.find(x => x.id === id);
    if (!acc) return;
    editingAccountId = id;
    const currentBal = state.transactions
        .filter(t => t.wallet === acc.name)
        .reduce((s, t) => s + (t.type === 'income' ? t.amt : -t.amt), 0);

    document.getElementById('acc-name').value        = acc.name;
    document.getElementById('acc-type').value        = acc.type;
    document.getElementById('acc-initial-amt').value = currentBal;
    document.getElementById('acc-form-title').innerText = 'Edit Account & Balance ✏️';
    document.getElementById('acc-btn-main').innerText   = 'Update Details';
    document.getElementById('acc-btn-cancel').classList.remove('hidden');
    showPage('accounts', document.querySelector('[onclick*="accounts"]'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelAccountEdit() {
    editingAccountId = null;
    document.getElementById('acc-name').value        = '';
    document.getElementById('acc-initial-amt').value = '';
    document.getElementById('acc-form-title').innerText = '🏦 Register New Account';
    // FIX: was resetting to "Save Account" but the original label is "Add Account"
    document.getElementById('acc-btn-main').innerText   = 'Add Account';
    document.getElementById('acc-btn-cancel').classList.add('hidden');
}

function deleteAccount(id) {
    const acc = state.accounts.find(x => x.id === id);
    if (!acc) return;
    if (state.transactions.some(t => t.wallet === acc.name)) {
        return alert('Cannot delete — this account has linked transactions.');
    }
    if (confirm('Delete account: ' + acc.name + '?')) {
        state.accounts = state.accounts.filter(a => a.id !== id);
        sync();
    }
}

// ── FIXED DEPOSITS ─────────────────────────────────────────────────────────
function showFDForm() {
    document.getElementById('fd-form').classList.toggle('hidden');
}

function handleFDAction() {
    const fdData = {
        id:          editingFDId || Date.now(),
        bank:        document.getElementById('fd-bank').value.trim(),
        beneficiary: document.getElementById('fd-beneficiary').value.trim() || 'Self',
        amount:      parseFloat(document.getElementById('fd-amount').value),
        rate:        parseFloat(document.getElementById('fd-rate').value),
        created:     document.getElementById('fd-created').value,
        maturity:    document.getElementById('fd-maturity').value
    };
    if (!fdData.bank || isNaN(fdData.amount) || !fdData.maturity) {
        return alert('Please fill Bank, Amount and Maturity date.');
    }
    if (editingFDId) {
        state.fds = state.fds.map(f => f.id === editingFDId ? fdData : f);
    } else {
        state.fds.push(fdData);
    }
    cancelFDEdit();
    sync();
}

function editFD(id) {
    const fd = state.fds.find(x => x.id === id);
    if (!fd) return;
    editingFDId = id;
    document.getElementById('fd-bank').value        = fd.bank;
    document.getElementById('fd-beneficiary').value = fd.beneficiary;
    document.getElementById('fd-amount').value      = fd.amount;
    document.getElementById('fd-rate').value        = fd.rate;
    document.getElementById('fd-created').value     = fd.created;
    document.getElementById('fd-maturity').value    = fd.maturity;
    // FIX: was targeting 'fd-form-title' which doesn't exist (it's 'fd-section-title')
    document.getElementById('fd-section-title').innerText = 'Edit FD Details ✏️';
    document.getElementById('fd-btn-save').innerText      = 'Update FD';
    document.getElementById('fd-form').classList.remove('hidden');
    document.getElementById('fd-form').scrollIntoView({ behavior: 'smooth' });
}

function cancelFDEdit() {
    editingFDId = null;
    document.getElementById('fd-form').classList.add('hidden');
    // FIX: same — correct ID
    document.getElementById('fd-section-title').innerText = 'Fixed Deposit (FD) Manager';
    document.getElementById('fd-btn-save').innerText      = 'Save FD';
    ['fd-bank','fd-beneficiary','fd-amount','fd-rate','fd-created','fd-maturity'].forEach(i => {
        const el = document.getElementById(i);
        if (el) el.value = '';
    });
}

// ── GOALS ──────────────────────────────────────────────────────────────────
function handleGoal() {
    const name   = document.getElementById('g-name').value.trim();
    const target = parseFloat(document.getElementById('g-target').value);
    const saved  = parseFloat(document.getElementById('g-saved').value) || 0;
    if (!name || isNaN(target) || target <= 0) return alert('Enter a valid goal name and target amount.');

    const goalData = { id: editingGoalId || Date.now(), name, target, current: saved };
    if (editingGoalId) {
        state.goals = state.goals.map(g => g.id === editingGoalId ? goalData : g);
    } else {
        state.goals.unshift(goalData);
    }
    cancelGoalEdit();
    sync();
}

function editGoal(id) {
    const g = state.goals.find(x => x.id === id);
    if (!g) return;
    editingGoalId = id;
    document.getElementById('g-name').value   = g.name;
    document.getElementById('g-target').value = g.target;
    document.getElementById('g-saved').value  = g.current;
    document.getElementById('g-form-title').innerText = 'Edit Goal ✏️';
    document.getElementById('g-save-btn').innerText   = 'Update Goal';
    document.getElementById('g-cancel-btn').classList.remove('hidden');
    showPage('goals', document.querySelector('[onclick*="goals"]'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelGoalEdit() {
    editingGoalId = null;
    document.getElementById('g-form-title').innerText = 'New Saving Goal';
    document.getElementById('g-save-btn').innerText   = 'Create Goal';
    document.getElementById('g-cancel-btn').classList.add('hidden');
    ['g-name','g-target','g-saved'].forEach(i => {
        const el = document.getElementById(i);
        if (el) el.value = '';
    });
}

// FIX: deleteGoal was completely missing from original script
function deleteGoal(id) {
    if (confirm('Delete this goal?')) {
        state.goals = state.goals.filter(g => g.id !== id);
        sync();
    }
}

function updateGoal(id) {
    const g = state.goals.find(x => x.id === id);
    if (!g || g.current >= g.target) return;
    const amt = parseFloat(prompt('Add contribution (₹):'));
    if (isNaN(amt) || amt <= 0) return;
    state.goals = state.goals.map(x => x.id === id ? { ...x, current: Math.min(x.target, x.current + amt) } : x);
    sync();
}

// ── RENDER ENGINE ──────────────────────────────────────────────────────────
function updateUI() {
    renderOverview();
    renderTransactions();
    renderGoals();
    renderAccounts();
    renderFDs();
    populateWalletSelect();
}

function renderOverview() {
    const inc = state.transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amt, 0);
    const exp = state.transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amt, 0);
    const net = inc - exp;
    const container = document.getElementById('overview-metrics');
    if (container) {
        container.innerHTML = `
            <div class="metric">
                <div class="metric-label">Total Liquid Balance</div>
                <div class="metric-value ${net >= 0 ? 'text-green' : 'text-red'}">₹${net.toLocaleString('en-IN')}</div>
            </div>
            <div class="metric">
                <div class="metric-label">Total Income</div>
                <div class="metric-value text-green">₹${inc.toLocaleString('en-IN')}</div>
            </div>
            <div class="metric">
                <div class="metric-label">Total Expenses</div>
                <div class="metric-value text-red">₹${exp.toLocaleString('en-IN')}</div>
            </div>`;
    }
    initCharts();
}

function renderTransactions() {
    const list = document.getElementById('tx-list');
    if (!list) return;
    const query    = (document.getElementById('tx-search').value || '').toLowerCase();
    let filtered   = state.transactions.filter(t =>
        t.desc.toLowerCase().includes(query) || t.cat.toLowerCase().includes(query) || t.wallet.toLowerCase().includes(query)
    );
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!filtered.length) { list.innerHTML = "<p style='color:var(--hint); padding: 20px 0;'>No records found.</p>"; return; }
    list.innerHTML = '';
    let lastDate = '';
    filtered.forEach(t => {
        if (t.date !== lastDate) {
            list.innerHTML += `<div class="tx-group-header">${t.date}</div>`;
            lastDate = t.date;
        }
        list.innerHTML += `
            <div class="tx-row">
                <div style="font-size: 20px; width:36px; flex-shrink:0;">${t.type === 'income' ? '💰' : '💸'}</div>
                <div class="tx-info">
                    <div style="font-weight: 500">${t.desc}</div>
                    <div style="font-size: 11px; color: var(--muted)">${t.cat} · ${t.wallet}</div>
                </div>
                <div class="tx-amt ${t.type === 'income' ? 'text-green' : 'text-red'}">
                    ${t.type === 'income' ? '+' : '−'} ₹${t.amt.toLocaleString('en-IN')}
                </div>
                <button class="btn btn-ghost btn-sm" onclick="editTx(${t.id})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTx(${t.id})">✕</button>
            </div>`;
    });
}

function renderGoals() {
    const cont = document.getElementById('goal-container');
    if (!cont) return;
    const query    = (document.getElementById('goal-search').value || '').toLowerCase();
    const filtered = state.goals.filter(g => g.name.toLowerCase().includes(query));
    if (!filtered.length) {
        cont.innerHTML = "<p style='color:var(--hint); grid-column: span 3; padding: 20px 0;'>No goals found.</p>";
        return;
    }
    cont.innerHTML = filtered.map(g => {
        const pct  = Math.min(100, Math.round((g.current / g.target) * 100));
        const done = pct >= 100;
        return `
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <div class="metric-label">${g.name}</div>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-ghost btn-sm" onclick="editGoal(${g.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteGoal(${g.id})">✕</button>
                    </div>
                </div>
                <div class="metric-value" style="font-size: 18px; margin-bottom: 4px;">
                    ₹${g.current.toLocaleString('en-IN')} / ₹${g.target.toLocaleString('en-IN')}
                </div>
                <div style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">${pct}% complete</div>
                <div style="height: 6px; background: var(--bg); border-radius: 3px; margin-bottom: 14px;">
                    <div style="width:${pct}%; height:100%; background:${done ? 'var(--green)' : 'var(--blue)'}; border-radius:3px; transition:width .4s;"></div>
                </div>
                <button class="btn btn-ghost" style="width:100%;" onclick="${done ? '' : 'updateGoal(' + g.id + ')'}">
                    ${done ? '✨ Goal Complete!' : 'Add Contribution'}
                </button>
            </div>`;
    }).join('');
}

function renderAccounts() {
    const container = document.getElementById('bank-cards-container');
    if (!container) return;
    if (!state.accounts.length) {
        container.innerHTML = '<p style="color:var(--hint); grid-column:span 3; padding: 10px 0;">No accounts yet.</p>';
        return;
    }
    container.innerHTML = state.accounts.map(acc => {
        const bal = state.transactions
            .filter(t => t.wallet === acc.name)
            .reduce((s, t) => s + (t.type === 'income' ? t.amt : -t.amt), 0);
        return `
            <div class="card" style="border-top: 3px solid ${acc.type === 'Cash' ? 'var(--amber)' : 'var(--blue)'}">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <div>
                        <div class="metric-label">${acc.type}</div>
                        <div style="font-size:18px; font-weight:600;">${acc.name}</div>
                    </div>
                    <div style="display:flex; gap:5px; align-items:flex-start;">
                        <button class="btn btn-ghost btn-sm" onclick="editAccount(${acc.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteAccount(${acc.id})">✕</button>
                    </div>
                </div>
                <div class="metric-value ${bal >= 0 ? 'text-green' : 'text-red'}">₹${bal.toLocaleString('en-IN')}</div>
                <textarea style="width:100%; margin-top:12px; height:60px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:6px; font-family:inherit; font-size:13px; resize:vertical;"
                    placeholder="Notes..."
                    oninput="saveAccNote('${acc.name}', this.value)">${state.notes[acc.name] || ''}</textarea>
            </div>`;
    }).join('');
}

function renderFDs() {
    const list = document.getElementById('fd-list');
    if (!list) return;
    if (!state.fds.length) {
        list.innerHTML = '<p style="color:var(--hint); padding:16px 0;">No active FDs. Add one above.</p>';
        return;
    }
    list.innerHTML = `
        <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse; min-width:580px;">
            <thead>
                <tr style="text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase;">
                    <th style="padding:12px 8px">Bank & Beneficiary</th>
                    <th style="padding:12px 8px">Principal</th>
                    <th style="padding:12px 8px">Rate</th>
                    <th style="padding:12px 8px">Created</th>
                    <th style="padding:12px 8px">Maturity</th>
                    <th style="padding:12px 8px; text-align:right">Action</th>
                </tr>
            </thead>
            <tbody>
                ${state.fds.map(fd => `
                    <tr style="border-top:1px solid var(--border)">
                        <td style="padding:12px 8px;"><strong>${fd.bank}</strong><br><small style="color:var(--muted)">👤 ${fd.beneficiary}</small></td>
                        <td style="padding:12px 8px; font-weight:600;">₹${fd.amount.toLocaleString('en-IN')}</td>
                        <td style="padding:12px 8px;" class="text-green">${fd.rate}%</td>
                        <td style="padding:12px 8px; color:var(--muted);">${fd.created || '—'}</td>
                        <td style="padding:12px 8px;">${fd.maturity}</td>
                        <td style="padding:12px 8px; text-align:right; white-space:nowrap;">
                            <button class="btn btn-ghost btn-sm" onclick="editFD(${fd.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteFD(${fd.id})">✕</button>
                        </td>
                    </tr>`).join('')}
            </tbody>
        </table>
        </div>`;
}

// FIX: extracted deleteFD to named function (was inline arrow — breaks on some IDs with numbers)
function deleteFD(id) {
    if (confirm('Delete this FD?')) {
        state.fds = state.fds.filter(f => f.id !== id);
        sync();
    }
}

function populateWalletSelect() {
    const sel = document.getElementById('f-wallet');
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = state.accounts.map(a => `<option value="${a.name}">${a.name} (${a.type})</option>`).join('');
    if (current) sel.value = current; // preserve selection during edit
}

function saveAccNote(accName, val) {
    state.notes[accName] = val;
    localStorage.setItem('aditi_notes', JSON.stringify(state.notes));
}

// ── CHARTS ─────────────────────────────────────────────────────────────────
function initCharts() {
    const summary = {};
    [...state.transactions]
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .forEach(t => {
            const k = t.date.slice(0, 7);
            if (!summary[k]) summary[k] = {
                label: new Date(t.date).toLocaleString('default', { month: 'short', year: '2-digit' }),
                inc: 0, exp: 0
            };
            t.type === 'income' ? summary[k].inc += t.amt : summary[k].exp += t.amt;
        });

    const labels  = Object.values(summary).map(d => d.label);
    const incData = Object.values(summary).map(d => d.inc);
    const expData = Object.values(summary).map(d => d.exp);
    const savData = Object.values(summary).map(d => d.inc - d.exp);

    const mixCtx = document.getElementById('chartMix');
    if (mixCtx) {
        if (charts.mix) charts.mix.destroy();
        charts.mix = new Chart(mixCtx, {
            type: 'bar',
            data: { labels, datasets: [
                { label: 'Income',   data: incData, backgroundColor: '#2dd98f', borderRadius: 4 },
                { label: 'Expenses', data: expData, backgroundColor: '#ff5f57', borderRadius: 4 }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#a0a0a5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#a0a0a5' }, grid: { display: false } }
                }
            }
        });
    }

    const trendCtx = document.getElementById('chartTrend');
    if (trendCtx) {
        if (charts.trend) charts.trend.destroy();
        charts.trend = new Chart(trendCtx, {
            type: 'line',
            data: { labels, datasets: [{
                label: 'Net Savings', data: savData,
                borderColor: '#4f8ef7', fill: true,
                backgroundColor: 'rgba(79,142,247,0.08)', tension: 0.4,
                pointRadius: 4, pointBackgroundColor: '#4f8ef7'
            }]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#a0a0a5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#a0a0a5' }, grid: { display: false } }
                }
            }
        });
    }
}

// ── IMPORT / EXPORT ────────────────────────────────────────────────────────
function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'finance_backup_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
        try {
            const parsed = JSON.parse(ev.target.result);
            if (!parsed.transactions || !parsed.goals || !parsed.accounts) {
                return alert('Invalid backup file.');
            }
            state = { notes: {}, fds: [], ...parsed };
            sync();
        } catch { alert('Could not parse JSON file.'); }
    };
    r.readAsText(file);
    e.target.value = '';
}

// ── INIT ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    const dateInput = document.getElementById('f-date');
    if (dateInput) dateInput.valueAsDate = new Date();
    updateUI();
});
</script>

</html>
